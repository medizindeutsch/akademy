<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PflegeAkademy: Pro Master</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --n-blue: #0ea5e9; --m-green: #10b981; --w-gold: #f59e0b; --d-red: #ef4444; --dark: #0f172a; --paper: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Poppins', sans-serif; background: #0f172a; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; }
        
        #app { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; padding: 15px; position: relative; background: #f8fafc; transition: 0.3s; }
        
        /* EFEKTLER */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
        .shake-eff { animation: shake 0.4s ease-in-out; }
        .flash-red { background: #fee2e2 !important; }
        .flash-green { background: #f0fdf4 !important; }

        .float-txt { position: absolute; font-family: 'Montserrat'; font-weight: 900; font-size: 24px; pointer-events: none; z-index: 1000; animation: floatUp 0.8s forwards ease-out; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-70px); } }

        /* ÜST PANEL */
        .top-panel { background: var(--dark); color: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-bottom: 4px solid var(--n-blue); }
        .xp-container { background: #334155; height: 10px; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        #xp-bar { background: linear-gradient(90deg, #38bdf8, #818cf8); height: 100%; width: 0%; transition: 0.5s; }
        .stats-row { display: flex; justify-content: space-between; font-weight: 700; font-size: 13px; color: #cbd5e1; }

        /* SORU KARTI */
        .q-card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e2e8f0; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .vaka { background: #f1f5f9; padding: 15px; border-radius: 15px; border-left: 5px solid var(--n-blue); font-size: 14px; text-align: left; margin-bottom: 20px; color: #475569; font-style: italic; }
        .opt { background: white; border: 2px solid #e2e8f0; border-radius: 15px; padding: 16px; margin-bottom: 10px; width: 100%; font-weight: 700; cursor: pointer; text-align: left; font-size: 15px; color: #1e293b; transition: 0.2s; }
        .opt.correct { background: var(--m-green); color: white; border-color: var(--m-green); }
        .opt.wrong { background: var(--d-red); color: white; border-color: var(--d-red); }

        /* MARKET */
        .archive-folder { background: #cbd5e1; padding: 10px; border-radius: 15px 15px 10px 10px; width: 100%; max-width: 420px; }
        .archive-content { background: var(--paper); padding: 15px; border-radius: 5px; max-height: 60vh; overflow-y: auto; border: 1px solid #94a3b8; }
        .file-item { display: flex; background: white; border: 1px solid #e5e7eb; margin-bottom: 10px; border-radius: 8px; cursor: pointer; align-items: center; }
        .file-icon { width: 50px; height: 50px; background: #f8fafc; display: flex; align-items: center; justify-content: center; font-size: 24px; border-right: 1px dashed #cbd5e1; }
        .file-info { padding: 10px; flex: 1; }
        .file-info b { display: block; font-size: 13px; }
        .price-tag { background: #fffbeb; color: #b45309; padding: 5px 10px; font-weight: 900; font-size: 12px; border-radius: 6px; margin-right: 10px; }

        /* MODALLAR */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; }
        .hidden { display: none !important; }
        .primary-btn { background: var(--n-blue); color: white; padding: 16px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; }

        #combo-text { position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%); font-family: 'Montserrat'; font-size: 50px; color: var(--w-gold); opacity: 0; pointer-events: none; z-index: 1000; text-shadow: 2px 2px 0 #000; }
        .combo-anim { animation: comboPop 0.8s forwards; }
        @keyframes comboPop { 0% { scale: 0.5; opacity: 0; } 40% { scale: 1.2; opacity: 1; } 100% { scale: 1; opacity: 0; transform: translate(-50%, -100px); } }

        .shield-badge { background: var(--w-gold); color: #000; padding: 2px 8px; border-radius: 5px; font-size: 11px; margin-left: 5px; vertical-align: middle; }
    </style>
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div class="modal-card">
            <div style="font-size: 60px;">🏥</div>
            <h1 style="font-family:'Montserrat';">PflegeAkademy</h1>
            <p style="color: #64748b; font-size: 14px;">Tıbbi Almanca Kariyer Simülasyonu</p>
            <input type="text" id="u-name" placeholder="İsminiz" style="width:100%; padding:15px; border-radius:10px; border:2px solid #ddd; margin-bottom:10px; text-align:center;">
            <button onclick="greetNurse()" class="primary-btn">BAŞLA</button>
        </div>
    </div>

    <div id="over-overlay" class="overlay hidden">
        <div class="modal-card" style="border: 4px solid var(--d-red);">
            <div style="font-size: 60px;">🚑</div>
            <h2 style="color:var(--d-red); font-family:'Montserrat';">GÖREV SONU</h2>
            <div style="background:#f8fafc; padding:15px; border-radius:15px; margin:15px 0; text-align:left;">
                <p>🏆 Rekorun: <b id="o-best">0</b>. Seviye</p>
                <p>📊 Ulaştığın Seviye: <b id="o-lvl">0</b></p>
                <p>💰 Topladığın Para: <b id="o-coin">0</b></p>
                <p>🎖️ Son Rütben: <b id="o-rank">-</b></p>
            </div>
            <button onclick="location.reload()" class="primary-btn" style="background:var(--dark);">YENİDEN DENE</button>
        </div>
    </div>

    <div id="gift-lock" class="overlay hidden" style="background: rgba(15,23,42,0.98);">
        <div onclick="clickGift()" style="text-align:center;">
            <div id="gift-emoji" style="font-size: 120px; cursor:pointer; transition:0.1s;">🎁</div>
            <p style="color:white; font-family:'Montserrat'; animation:pulse 0.8s infinite;">HEDİYEYİ PATLAT!</p>
        </div>
    </div>

    <div id="combo-text">KOMBO X2</div>

    <div id="app" class="hidden">
        <div class="top-panel" id="t-panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div id="rank-name" style="font-size:10px; font-weight:900; color:var(--n-blue); text-transform:uppercase;">STAJYER</div>
                    <div id="u-display" style="font-weight:700;">Hemşire</div>
                </div>
                <button onclick="openShop()" style="background:var(--w-gold); border:none; padding:8px 15px; border-radius:10px; font-weight:900; cursor:pointer;">🛒 MARKET</button>
            </div>
            <div class="xp-container"><div id="xp-bar"></div></div>
            <div class="stats-row">
                <span>💰 <span id="c-val">0</span></span>
                <span>LVL <span id="l-val">1</span></span>
                <span>❤️ <span id="h-val">5</span> <span id="shield-val" class="shield-badge hidden">🛡️ 0</span></span>
            </div>
        </div>

        <div class="q-card" id="q-container">
            <div class="vaka" id="v-txt">Yükleniyor...</div>
            <h2 id="q-word" style="margin: 0 0 20px 0; font-size: 24px;">Kelime</h2>
            <div id="opt-grid"></div>
        </div>
    </div>

    <div id="shop-overlay" class="overlay hidden" onclick="toggle('shop-overlay', false)">
        <div class="archive-folder" onclick="event.stopPropagation()">
            <div style="padding:10px; font-weight:800; font-size:12px; text-align:center;">🏥 HASTANE MARKETİ</div>
            <div class="archive-content" id="shop-list"></div>
            <button onclick="toggle('shop-overlay', false)" class="primary-btn" style="background:#64748b;">KAPAT</button>
        </div>
    </div>

    <div id="res-overlay" class="overlay hidden">
        <div class="modal-card">
            <div id="res-ico" style="font-size:60px;">🎊</div>
            <h2 id="res-ttl">TEBRİKLER</h2>
            <p id="res-dsc"></p>
            <button id="res-btn" class="primary-btn">DEVAM ET</button>
        </div>
    </div>

<script>
    const DATA = [
        { de: "Blutdruck", tr: "Tansiyon", vaka: "Der Blutdruck ist zu hoch." },
        { de: "Spritze", tr: "Şırınga", vaka: "Bereiten Sie die Spritze vor." },
        { de: "Verband", tr: "Sargı / Pansuman", vaka: "Der Verband muss gewechselt werden." },
        { de: "Aspirin", tr: "Aspirin", vaka: "Geben Sie dem Patienten eine Aspirin." }
    ];

    const REWARDS = [
        { i: "💰", t: "Ek Primi", d: "+250 Para!", fn: () => st.coins += 250 },
        { i: "📉", t: "Hata Cezası", d: "-100 Para Gitti!", fn: () => st.coins = Math.max(0, st.coins-100) },
        { i: "💉", t: "Vitamin", d: "+1 Can!", fn: () => st.lives += 1 },
        { i: "🛡️", t: "Kalkan", d: "+1 Koruma!", fn: () => st.shields += 1 },
        { i: "🤕", t: "Yorgunluk", d: "-1 Can Gitti!", fn: () => st.lives-- }
    ];

    const SHOP_ITEMS = [
        { id: 'h1', n: "Hızlı Serum", d: "+1 Can İadesi", p: 200, l: 1, i: "💉" },
        { id: 's1', n: "Maske", d: "1 Hata & Kombo Koruması", p: 500, l: 3, i: "😷" },
        { id: 'x1', n: "Eğitim Kitabı", d: "+1000 XP", p: 700, l: 5, i: "📚" }
    ];

    const RANKS = ["Stajyer", "Asistan", "Uzman", "Şef", "Başhemşire"];
    let st = { xp: 0, coins: 200, lives: 5, level: 1, streak: 0, shields: 0, name: "", busy: false, giftClicks: 0 };
    let queue = [];

    function greetNurse() {
        st.name = document.getElementById('u-name').value || "Hemşire";
        document.getElementById('u-display').innerText = st.name;
        toggle('login-overlay', false); toggle('app', true); upUI(); next();
    }

    function upUI() {
        document.getElementById('c-val').innerText = st.coins;
        document.getElementById('h-val').innerText = st.lives;
        document.getElementById('l-val').innerText = st.level;
        
        let rIdx = Math.min(Math.floor((st.level-1)/3), RANKS.length-1);
        document.getElementById('rank-name').innerText = RANKS[rIdx];

        let sb = document.getElementById('shield-val');
        if(st.shields > 0) { sb.innerText = "🛡️ " + st.shields; sb.classList.remove('hidden'); }
        else { sb.classList.add('hidden'); }

        let nx = st.level * 400;
        document.getElementById('xp-bar').style.width = (st.xp / nx * 100) + "%";
        
        if(st.xp >= nx) { st.level++; st.xp = 0; st.coins += 150; queue.push('levelup'); }
    }

    function processQueue() {
        upUI();
        if(queue.length > 0) {
            let a = queue.shift();
            if(a === 'levelup') showLevelUp();
            else if(a === 'gift') toggle('gift-lock', true);
        } else { st.busy = false; next(); }
    }

    function showLevelUp() {
        document.getElementById('res-ico').innerText = "🎖️";
        document.getElementById('res-ttl').innerText = "LEVEL UP!";
        document.getElementById('res-dsc').innerText = "Tebrikler, artık Seviye " + st.level;
        document.getElementById('res-btn').onclick = () => { toggle('res-overlay', false); processQueue(); };
        toggle('res-overlay', true);
        confetti({ particleCount: 150, spread: 70 });
    }

    // GAME OVER MANTIĞI (YENİ)
    function gameOver() {
        // En yüksek skoru kaydet (LocalStorage)
        let best = localStorage.getItem('best_lvl') || 0;
        if(st.level > best) localStorage.setItem('best_lvl', st.level);
        
        document.getElementById('o-best').innerText = localStorage.getItem('best_lvl');
        document.getElementById('o-lvl').innerText = st.level;
        document.getElementById('o-coin').innerText = st.coins;
        document.getElementById('o-rank').innerText = document.getElementById('rank-name').innerText;
        
        toggle('over-overlay', true);
    }

    function next() {
        let q = DATA[Math.floor(Math.random()*DATA.length)];
        document.getElementById('v-txt').innerText = q.vaka;
        document.getElementById('q-word').innerText = q.de;
        let opts = [q.tr, ...DATA.filter(d => d.tr !== q.tr).map(d => d.tr)].slice(0, 4).sort(() => Math.random() - 0.5);
        
        const grid = document.getElementById('opt-grid'); grid.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button'); b.className = "opt"; b.innerText = o;
            b.onclick = (e) => {
                if(st.busy) return; st.busy = true;
                if(o === q.tr) {
                    b.classList.add('correct'); st.xp += 80; st.coins += 30; st.streak++;
                    triggerEffect('green');
                    spawnText(e, "+80 XP", "#10b981");
                    if(st.streak >= 5) { st.streak = 0; queue.push('gift'); }
                } else {
                    b.classList.add('wrong');
                    triggerEffect('red');
                    if(st.shields > 0) { st.shields--; spawnText(e, "🛡️ KORUNDU", "#f59e0b"); }
                    else { st.lives--; st.streak = 0; spawnText(e, "-1 CAN", "#ef4444"); }
                    
                    if(st.lives <= 0) { gameOver(); return; } // CAN BİTTİĞİNDE BURASI ÇALIŞIR
                }
                setTimeout(processQueue, 700);
            };
            grid.appendChild(b);
        });
    }

    function spawnText(e, txt, color) {
        const s = document.createElement('span'); s.className = 'float-txt'; s.innerText = txt;
        s.style.color = color; s.style.left = e.clientX + 'px'; s.style.top = e.clientY + 'px';
        document.body.appendChild(s); setTimeout(() => s.remove(), 800);
    }

    function triggerEffect(type) {
        const a = document.getElementById('app'); a.classList.add(type === 'green' ? 'flash-green' : 'shake-eff');
        if(type === 'red') a.classList.add('flash-red');
        setTimeout(() => a.classList.remove('shake-eff', 'flash-red', 'flash-green'), 500);
    }

    function openShop() {
        const list = document.getElementById('shop-list'); list.innerHTML = "";
        SHOP_ITEMS.forEach(it => {
            const lk = st.level < it.l;
            const div = document.createElement('div'); div.className = "file-item";
            div.innerHTML = `<div class="file-icon">${lk?'🔒':it.i}</div><div class="file-info"><b>${it.n}</b><small>${lk?'Lv.'+it.l:it.d}</small></div><div class="price-tag">${it.p} 💰</div>`;
            if(!lk) div.onclick = () => {
                if(st.coins >= it.p) { 
                    st.coins -= it.p; 
                    if(it.id==='h1') st.lives++; if(it.id==='s1') st.shields++; if(it.id==='x1') st.xp += 1000;
                    upUI(); alert("Satın Alındı!");
                } else alert("Para yetersiz!");
            };
            list.appendChild(div);
        });
        toggle('shop-overlay', true);
    }

    function clickGift() {
        st.giftClicks++;
        document.getElementById('gift-emoji').style.transform = `scale(${1 + st.giftClicks*0.3})`;
        if(st.giftClicks >= 6) {
            st.giftClicks = 0; document.getElementById('gift-emoji').style.transform = "scale(1)";
            let r = REWARDS[Math.floor(Math.random()*REWARDS.length)]; r.fn();
            toggle('gift-lock', false);
            document.getElementById('res-ico').innerText = r.i;
            document.getElementById('res-ttl').innerText = r.t;
            document.getElementById('res-dsc').innerText = r.d;
            document.getElementById('res-btn').onclick = () => { toggle('res-overlay', false); processQueue(); };
            toggle('res-overlay', true); confetti();
        }
    }

    function toggle(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }
</script>
</body>
</html>
