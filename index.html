<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PflegeAkademy: Archive Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --n-blue: #0ea5e9; --m-green: #10b981; --w-gold: #f59e0b; --d-red: #ef4444; --dark: #0f172a; --paper: #fffef0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Poppins', sans-serif; background: #0f172a; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; color: #1e293b; }
        #app { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; padding: 15px; position: relative; background: #f8fafc; }

        /* ÜST PANEL */
        .top-panel { background: var(--dark); color: white; padding: 18px; border-radius: 25px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-bottom: 4px solid var(--n-blue); }
        .xp-container { background: #334155; height: 10px; border-radius: 10px; margin: 12px 0; overflow: hidden; border: 1px solid #475569; }
        #xp-bar { background: linear-gradient(90deg, #38bdf8, #818cf8); height: 100%; width: 0%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .stats-row { display: flex; justify-content: space-between; font-weight: 800; font-size: 13px; color: #cbd5e1; }

        /* SORU KARTI */
        .q-card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e2e8f0; }
        .vaka { background: #f1f5f9; padding: 15px; border-radius: 15px; border-left: 6px solid var(--n-blue); font-size: 13px; text-align: left; margin-bottom: 15px; color: #475569; line-height: 1.5; font-style: italic; }
        .opt { background: white; border: 2px solid #f1f5f9; border-radius: 20px; padding: 16px; margin-bottom: 10px; width: 100%; font-weight: 700; cursor: pointer; text-align: left; transition: 0.2s; font-size: 15px; }
        .opt.correct { background: var(--m-green); color: white; border-color: var(--m-green); box-shadow: 0 5px 15px rgba(16,185,129,0.3); }
        .opt.wrong { background: var(--d-red); color: white; border-color: var(--d-red); }

        /* DOSYA GÖRÜNÜMLÜ MARKET */
        #shop-overlay { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); }
        .archive-folder { background: #e2e8f0; padding: 10px; border-radius: 20px 20px 10px 10px; width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .archive-content { background: var(--paper); padding: 20px; border-radius: 5px; border: 1px solid #d1d5db; max-height: 70vh; overflow-y: auto; }
        .file-item { display: flex; background: white; border: 1px solid #e5e7eb; margin-bottom: 15px; border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); position: relative; cursor: pointer; transition: 0.2s; }
        .file-item:hover:not(.locked) { transform: rotate(-1deg) scale(1.02); z-index: 10; }
        .file-icon { width: 60px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 30px; border-right: 2px dashed #d1d5db; }
        .file-info { padding: 12px; flex: 1; }
        .file-info b { display: block; font-size: 14px; text-transform: uppercase; color: var(--dark); }
        .file-info span { font-size: 11px; color: #64748b; }
        .file-price { padding: 12px; display: flex; align-items: center; justify-content: center; }
        .price-tag { background: #fee2e2; color: #991b1b; padding: 4px 10px; border-radius: 4px; font-weight: 900; font-size: 12px; border: 1px solid #f87171; }
        .file-item.locked { filter: grayscale(1); opacity: 0.6; }

        /* KOMBO & HEDİYE (AYNI KALDI) */
        #combo-text { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-family: 'Montserrat'; font-size: 55px; color: var(--w-gold); z-index: 500; pointer-events: none; opacity: 0; text-shadow: 2px 2px 0 #000; }
        .combo-anim { animation: comboPop 0.8s ease-out forwards; }
        @keyframes comboPop { 0% { scale: 0.5; opacity: 0; } 50% { scale: 1.4; opacity: 1; } 100% { scale: 1; opacity: 0; transform: translate(-50%, -100%); } }

        .gift-lock-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gift-emoji { font-size: 140px; cursor: pointer; transition: transform 0.1s; filter: drop-shadow(0 0 40px gold); }
        .click-hint { color: white; font-family: 'Montserrat'; font-size: 24px; margin-top: 30px; animation: pulse 0.6s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); color: var(--w-gold); } }

        .overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .fancy-card { background: white; padding: 35px; border-radius: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .hidden { display: none !important; }
        .shop-btn { background: var(--w-gold); color: #0f172a; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 900; font-family: 'Montserrat'; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay" class="overlay" style="background: white;">
        <div class="fancy-card" style="border: 2px solid #f1f5f9; box-shadow: none;">
            <div style="font-size: 70px;">👨‍⚕️</div>
            <h1 style="font-family:'Montserrat'; color:var(--n-blue); margin: 10px 0;">PflegeAkademy</h1>
            <input type="text" id="u-name" placeholder="İsminiz" style="width:100%; padding:20px; border-radius:15px; border:2px solid #ddd; margin-bottom:20px; text-align:center; font-size:18px;">
            <button onclick="greetNurse()" style="width:100%; background:var(--n-blue); color:white; padding:20px; border:none; border-radius:15px; font-weight:900; cursor:pointer;">DOSYAYI AÇ</button>
        </div>
    </div>

    <div id="nurse-overlay" class="overlay hidden">
        <div class="fancy-card">
            <h2 id="n-title" style="color:var(--n-blue);">Merhaba!</h2>
            <p style="font-weight: 600; color: #475569;">Unutma aslanım, 5 kombo yapınca hediye paketi gelir. Onu patlatmadan oyuna devam edemezsin! 🎁</p>
            <button onclick="startApp()" style="background:var(--m-green); color:white; border:none; padding:15px 40px; border-radius:15px; font-weight:900; cursor:pointer;">HAZIRIM!</button>
        </div>
    </div>

    <div id="gift-lock" class="gift-lock-overlay hidden">
        <div onclick="clickGift()" style="text-align:center;">
            <div id="gift-emoji" class="gift-emoji">🎁</div>
            <div class="click-hint">SÜREKLİ TIKLA!</div>
        </div>
    </div>

    <div id="combo-text">KOMBO X2</div>

    <div id="app" class="hidden">
        <div class="top-panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div id="rank-name" style="font-size:10px; font-weight:900; color:var(--n-blue);">STAJYER</div>
                    <div id="u-display" style="font-weight:700; font-size:16px;">Hemşire</div>
                </div>
                <button class="shop-btn" onclick="openShop()">📁 MARKET</button>
            </div>
            <div class="xp-container"><div id="xp-bar"></div></div>
            <div class="stats-row">
                <span>💰 <span id="c-val">100</span> <small id="income-tag" style="color:var(--m-green)">(+25)</small></span>
                <span>LVL <span id="l-val">1</span></span>
                <span>❤️ <span id="h-val">5</span></span>
            </div>
        </div>

        <div class="q-card">
            <div class="vaka" id="v-txt">...</div>
            <h2 id="q-word" style="font-size: 26px; margin: 15px 0;">Wort</h2>
            <div id="opt-grid"></div>
        </div>
    </div>

    <div id="shop-overlay" class="overlay hidden" onclick="toggle('shop-overlay', false)">
        <div class="archive-folder" onclick="event.stopPropagation()">
            <div style="padding:5px 15px; font-weight:900; font-size:12px; color:#475569;">HASTANE ENVANTERİ / MARKET</div>
            <div class="archive-content" id="shop-list"></div>
            <button onclick="toggle('shop-overlay', false)" style="width:100%; padding:12px; border:none; background:#94a3b8; color:white; font-weight:900; border-radius:0 0 10px 10px; cursor:pointer;">DOSYAYI KAPAT</button>
        </div>
    </div>

    <div id="res-overlay" class="overlay hidden">
        <div class="fancy-card">
            <div id="res-ico" style="font-size:70px;">🏆</div>
            <h1 id="res-ttl" style="font-family:'Montserrat'; color:var(--w-gold);">TEBRİKLER!</h1>
            <p id="res-dsc">...</p>
            <div id="reward-info" style="background:#f0fdf4; color:#15803d; padding:10px; border-radius:10px; font-weight:800; margin-top:10px;" class="hidden"></div>
            <button onclick="toggle('res-overlay', false)" style="width:100%; background:var(--n-blue); color:white; padding:18px; border:none; border-radius:15px; font-weight:900; margin-top:15px;">DEVAM ET</button>
        </div>
    </div>

<script>
    const DATA = [
        { de: "Desinfektion", tr: "Dezenfeksiyon", vaka: "Händedesinfektion ist vor jeder Untersuchung Pflicht." },
        { de: "Spritze", tr: "Şırınga", vaka: "Die Spritze liegt bereit für die Impfung." },
        { de: "Rollstuhl", tr: "Tekerlekli sandalye", vaka: "Bringen Sie den Patienten bitte mit dem Rollstuhl zum Röntgen." },
        { de: "Pflaster", tr: "Yara bandı", vaka: "Die kleine Wunde braucht nur ein Pflaster." }
    ];

    const RANKS = ["Stajyer", "Yardımcı Hemşire", "Kıdemli Hemşire", "Servis Sorumlusu", "Başhemşire", "Profesör"];

    let st = { xp: 0, coins: 150, lives: 5, level: 1, streak: 0, busy: false, name: "", giftClicks: 0, hasShield: false };

    function greetNurse() {
        st.name = document.getElementById('u-name').value || "Hemşire";
        document.getElementById('u-display').innerText = st.name;
        document.getElementById('n-title').innerText = "Dosyan Hazır " + st.name + "!";
        toggle('login-overlay', false); toggle('nurse-overlay', true);
    }

    function startApp() { toggle('nurse-overlay', false); toggle('app', true); upUI(); next(); }

    function upUI() {
        document.getElementById('c-val').innerText = st.coins;
        document.getElementById('h-val').innerText = st.lives;
        document.getElementById('l-val').innerText = st.level;
        
        let income = 20 + (st.level * 5);
        document.getElementById('income-tag').innerText = `(+${income})`;
        
        let rankIdx = Math.min(Math.floor((st.level - 1) / 2), RANKS.length - 1);
        document.getElementById('rank-name').innerText = RANKS[rankIdx];

        // ZORLAŞTIRILMIŞ LEVEL SİSTEMİ
        let nx = st.level * 450; 
        document.getElementById('xp-bar').style.width = (st.xp / nx * 100) + "%";
        
        if(st.xp >= nx) {
            st.level++; st.xp = 0; 
            let bonus = st.level * 200;
            st.coins += bonus;
            showLevelUp(bonus);
        }
    }

    function showLevelUp(bonus) {
        document.getElementById('res-ico').innerText = "🎊";
        document.getElementById('res-ttl').innerText = "SEVİYE ATLADIN!";
        document.getElementById('res-dsc').innerHTML = `Tebrikler! <b>${st.level}. Seviye</b> oldun.`;
        const rb = document.getElementById('reward-info');
        rb.innerText = `ÖDÜL: +${bonus} 💰`;
        rb.classList.remove('hidden');
        toggle('res-overlay', true);
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }

    function next() {
        let q = DATA[Math.floor(Math.random()*DATA.length)];
        document.getElementById('v-txt').innerText = q.vaka;
        document.getElementById('q-word').innerText = q.de;
        let opts = [q.tr, ...DATA.filter(d => d.tr !== q.tr).map(d => d.tr)].slice(0, 4).sort(() => Math.random() - 0.5);
        const grid = document.getElementById('opt-grid'); grid.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button'); b.className = "opt"; b.innerText = o;
            b.onclick = () => {
                if(st.busy) return;
                st.busy = true;
                if(o === q.tr) {
                    b.classList.add('correct'); st.xp += 70; st.coins += (20 + (st.level * 5)); st.streak++;
                    showComboEffect(st.streak);
                    if(st.streak >= 5) { st.streak = 0; setTimeout(() => toggle('gift-lock', true), 800); }
                } else {
                    b.classList.add('wrong');
                    if(st.hasShield) { st.hasShield = false; alert("Maske seni korudu!"); } else { st.lives--; }
                    st.streak = 0;
                    if(st.lives <= 0) location.reload();
                }
                upUI(); setTimeout(() => { st.busy = false; next(); }, 800);
            };
            grid.appendChild(b);
        });
    }

    function showComboEffect(count) {
        if(count < 2) return;
        const ct = document.getElementById('combo-text');
        ct.innerText = `KOMBO X${count}`;
        ct.classList.remove('combo-anim');
        void ct.offsetWidth;
        ct.classList.add('combo-anim');
    }

    function openShop() {
        const list = document.getElementById('shop-list');
        list.innerHTML = "";
        const items = [
            { id: 'heart', n: "Serum Paketi", d: "1 Can İade Eder", p: 300, l: 1, icon: "💉" },
            { id: 'gift', n: "Sürpriz Paket", d: "Patlat ve Kazan", p: 200, l: 3, icon: "🎁" },
            { id: 'shield', n: "Ffp3 Maske", d: "Hata Koruması", p: 500, l: 5, icon: "🛡️" },
            { id: 'xp', n: "Uzmanlık Tezi", d: "+1500 XP Puanı", p: 1000, l: 25, icon: "📂" }
        ];

        items.forEach(i => {
            const isLocked = st.level < i.l;
            const div = document.createElement('div');
            div.className = `file-item ${isLocked ? 'locked' : ''}`;
            div.innerHTML = `
                <div class="file-icon">${isLocked ? '🔒' : i.icon}</div>
                <div class="file-info">
                    <b>${i.n}</b>
                    <span>${isLocked ? 'Seviye '+i.l+' Gerekli' : i.d}</span>
                </div>
                <div class="file-price">
                    ${!isLocked ? `<div class="price-tag">${i.p} 💰</div>` : ''}
                </div>
            `;
            if(!isLocked) div.onclick = () => buy(i.id, i.p, i.n);
            list.appendChild(div);
        });
        toggle('shop-overlay', true);
    }

    function buy(id, cost, name) {
        if(st.coins < cost) { alert("Yetersiz Bakiye!"); return; }
        st.coins -= cost;
        if(id === 'gift') { toggle('shop-overlay', false); toggle('gift-lock', true); }
        else if(id === 'heart') st.lives++;
        else if(id === 'shield') st.hasShield = true;
        else if(id === 'xp') st.xp += 1500;
        upUI();
        alert(name + " satın alındı!");
    }

    function clickGift() {
        st.giftClicks++;
        let s = 1 + (st.giftClicks * 0.45);
        document.getElementById('gift-emoji').style.transform = `scale(${s})`;
        if(st.giftClicks >= 6) {
            document.getElementById('gift-emoji').style.transform = `scale(0)`;
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.5 } });
            let pool = [
                { i: "💰", t: "PRİM", d: "+500 💰 Kazandın!", fn: () => st.coins += 500 },
                { i: "💉", t: "VİTAMİN", d: "+2 Can Kazandın!", fn: () => st.lives += 2 },
                { i: "📉", t: "CEZA", d: "-100 💰 Kesildi!", fn: () => st.coins = Math.max(0, st.coins-100) }
            ];
            let r = pool[Math.floor(Math.random()*pool.length)];
            r.fn();
            setTimeout(() => {
                toggle('gift-lock', false);
                document.getElementById('res-ico').innerText = r.i;
                document.getElementById('res-ttl').innerText = r.t;
                document.getElementById('res-dsc').innerText = r.d;
                document.getElementById('reward-info').classList.add('hidden');
                toggle('res-overlay', true);
                st.giftClicks = 0;
                document.getElementById('gift-emoji').style.transform = `scale(1)`;
                upUI();
            }, 500);
        }
    }

    function toggle(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }
</script>
</body>
</html>
