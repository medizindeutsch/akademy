<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedDeutsch Elite v5 - ASIL</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --der: #3a7bd5; --die: #f44336; --das: #4caf50;
            --bg: #f8fafc; --text: #1e293b; --card: #ffffff;
        }
        .dark-mode {
            --bg: #0f172a; --text: #f1f5f9; --card: #1e293b;
        }

        body {
            font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; display: flex; justify-content: center; min-height: 100vh; transition: 0.3s;
        }

        #app-container { width: 100%; max-width: 450px; padding: 20px; position: relative; }

        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .mode-btn { background: none; border: none; font-size: 24px; cursor: pointer; }

        /* CAN GÖSTERGESİ (5 CAN) */
        .hearts-container { font-size: 20px; font-weight: 900; letter-spacing: 2px; }

        .timer-container { width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #timer-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); transition: linear 1s; }

        .card {
            background: var(--card); border-radius: 30px; padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px;
            position: relative; border: 1px solid rgba(255,255,255,0.1);
        }

        .badge { padding: 5px 15px; border-radius: 12px; font-weight: 800; color: white; font-size: 12px; text-transform: uppercase; }
        .der { background: var(--der); } .die { background: var(--die); } .das { background: var(--das); }

        .btn-opt {
            background: var(--card); color: var(--text); border: 2px solid #e2e8f0;
            border-radius: 20px; padding: 15px 20px; width: 100%; margin-bottom: 12px;
            font-weight: 600; text-align: left; cursor: pointer; transition: 0.2s;
        }
        .btn-opt:hover { border-color: #3a7bd5; transform: scale(1.02); }

        /* HATA LİSTESİ TASARIMI */
        .error-panel {
            background: rgba(244, 67, 54, 0.05); border: 2px dashed #f44336;
            border-radius: 20px; padding: 15px; margin-top: 20px;
        }
        .error-title { color: #f44336; font-weight: 900; margin-bottom: 10px; font-size: 16px; text-transform: uppercase; }
        .error-item { 
            display: flex; justify-content: space-between; background: var(--card);
            padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; font-size: 13px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .hidden { display: none !important; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }

        #combo-ui { position: absolute; right: 25px; top: 100px; font-weight: 900; color: #f59e0b; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="top-nav">
        <div class="hearts-container">❤️ <span id="hearts">5</span></div>
        <div id="xp-display" style="font-weight: 900;">XP: 0</div>
        <button class="mode-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="timer-container"><div id="timer-fill"></div></div>
    <div id="combo-ui">🔥 <span id="combo-count">0</span> COMBO</div>

    <div id="quiz-screen">
        <div class="card">
            <div id="art-badge" class="badge">MEDICAL</div>
            <h1 id="q-word" style="font-size: 30px; margin: 15px 0;">Yükleniyor...</h1>
            <button onclick="speak()" style="background:#3a7bd520; border:none; padding:15px; border-radius:50%; cursor:pointer;">🔊</button>
        </div>
        <div id="options-grid"></div>
    </div>

    <div id="over-screen" class="hidden">
        <div class="card">
            <h2 style="font-size: 36px; margin:0;">🚑 OYUN BİTTİ</h2>
            <p id="final-score" style="font-size: 20px; font-weight: 700; color:#3a7bd5;">0 XP</p>
            
            <div id="error-section" class="error-panel hidden">
                <div class="error-title">⚠️ HATALARINI NOT AL</div>
                <div id="error-list"></div>
            </div>

            <button class="btn-opt" style="background:#3a7bd5; color:white; text-align:center; margin-top:20px;" onclick="location.reload()">YENİDEN DENE</button>
        </div>
    </div>
</div>

<script>
    const VOCAB = [
        { de: "Herzinfarkt", art: "der", tr: "Kalp krizi" },
        { de: "Blutdruck", art: "der", tr: "Kan basıncı" },
        { de: "Entzündung", art: "die", tr: "İltihap" },
        { de: "Fieber", art: "das", tr: "Ateş" },
        { de: "Untersuchung", art: "die", tr: "Muayene" },
        { de: "Husten", art: "der", tr: "Öksürük" },
        { de: "Übelkeit", art: "die", tr: "Bulantı" },
        { de: "Erbrechen", art: "das", tr: "Kusma" },
        { de: "Atemnot", art: "die", tr: "Nefes darlığı" },
        { de: "Schwindel", art: "der", tr: "Baş dönmesi" },
        { de: "Wirbelsäule", art: "die", tr: "Omurga" },
        { de: "Gelenk", art: "das", tr: "Eklem" },
        { de: "Gehirn", art: "das", tr: "Beyin" },
        { de: "Lunge", art: "die", tr: "Akciğer" },
        { de: "Magen", art: "der", tr: "Mide" }
    ];

    let state = {
        xp: 0, hearts: 5, combo: 0, current: null, 
        timeLeft: 15, timerInterval: null, mistakes: []
    };

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        document.querySelector('.mode-btn').innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    }

    function startTimer() {
        state.timeLeft = 15;
        clearInterval(state.timerInterval);
        state.timerInterval = setInterval(() => {
            state.timeLeft--;
            document.getElementById('timer-fill').style.width = (state.timeLeft / 15 * 100) + "%";
            if(state.timeLeft <= 0) handleWrong(null);
        }, 1000);
    }

    function nextQuestion() {
        state.current = VOCAB[Math.floor(Math.random() * VOCAB.length)];
        const badge = document.getElementById('art-badge');
        badge.innerText = state.current.art;
        badge.className = `badge ${state.current.art}`;
        document.getElementById('q-word').innerText = state.current.de;
        
        let opts = [state.current.tr];
        while(opts.length < 4) {
            let r = VOCAB[Math.floor(Math.random() * VOCAB.length)].tr;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('options-grid');
        grid.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = "btn-opt";
            b.innerText = o;
            b.onclick = () => (o === state.current.tr ? handleCorrect(b) : handleWrong(b));
            grid.appendChild(b);
        });
        startTimer();
    }

    function handleCorrect(btn) {
        clearInterval(state.timerInterval);
        state.combo++;
        state.xp += 10 + (state.combo * 2);
        btn.classList.add('correct');
        
        if(state.combo >= 3) {
            const ui = document.getElementById('combo-ui');
            ui.style.opacity = "1";
            document.getElementById('combo-count').innerText = state.combo;
        }

        confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
        setTimeout(nextQuestion, 500);
        updateUI();
    }

    function handleWrong(btn) {
        clearInterval(state.timerInterval);
        state.combo = 0;
        state.hearts--;
        if(btn) btn.classList.add('wrong');
        document.getElementById('combo-ui').style.opacity = "0";
        
        // Hata listesine ekle
        if(!state.mistakes.find(m => m.de === state.current.de)) {
            state.mistakes.push(state.current);
        }

        if(state.hearts <= 0) {
            endGame();
        } else {
            setTimeout(nextQuestion, 800);
        }
        updateUI();
    }

    function endGame() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('over-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = state.xp + " TOPLAM XP";
        
        if(state.mistakes.length > 0) {
            const section = document.getElementById('error-section');
            const list = document.getElementById('error-list');
            section.classList.remove('hidden');
            list.innerHTML = state.mistakes.map(m => `
                <div class="error-item">
                    <span><b>${m.art} ${m.de}</b></span>
                    <span style="color:#94a3b8">➔</span>
                    <span>${m.tr}</span>
                </div>
            `).join('');
        }
    }

    function updateUI() {
        document.getElementById('hearts').innerText = state.hearts;
        document.getElementById('xp-display').innerText = "XP: " + state.xp;
    }

    function speak() {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(`${state.current.art} ${state.current.de}`);
        u.lang = 'de-DE'; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }

    nextQuestion();
</script>
</body>
</html>
