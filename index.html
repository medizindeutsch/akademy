<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PflegeDeutsch Wheel Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nurse-blue: #0ea5e9; --med-green: #10b981; --warning-gold: #f59e0b;
            --danger-red: #ef4444; --bg: #f0f4f8; --card: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; 
            display: flex; justify-content: center; height: 100vh; overflow: hidden; 
        }
        
        #app { 
            width: 100%; max-width: 500px; height: 100%; display: flex; 
            flex-direction: column; padding: 10px; position: relative;
        }

        /* ÜST PANEL - KÜÇÜLTÜLDÜ */
        .header {
            background: white; padding: 10px 15px; border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 8px; border: 2px solid var(--nurse-blue);
            flex-shrink: 0;
        }

        /* MARKET - YATAY VE İNCE */
        .market-belt {
            display: flex; justify-content: space-around; background: #1e293b;
            padding: 8px; border-radius: 18px; margin-bottom: 8px; color: white; flex-shrink: 0;
        }
        .item { text-align: center; cursor: pointer; flex: 1; }
        .item-icon { font-size: 18px; }
        .item-price { font-size: 10px; background: var(--warning-gold); color: black; border-radius: 8px; padding: 1px 4px; font-weight: 800; }

        /* SORU KARTI - ESNEK (FLEX) */
        .game-main { flex-grow: 1; display: flex; flex-direction: column; min-height: 0; }
        
        .card {
            background: var(--card); border-radius: 25px; padding: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05); text-align: center;
            border-bottom: 5px solid var(--nurse-blue); margin-bottom: 10px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .report-text {
            background: #f0f9ff; border-radius: 12px; padding: 10px;
            font-size: 12px; color: #1e40af; border-left: 4px solid var(--nurse-blue);
            text-align: left; margin-bottom: 10px;
        }

        /* ŞIKLAR - SIKIŞTIRILDI */
        .options-container { 
            display: grid; grid-template-columns: 1fr; gap: 6px; overflow-y: auto;
            padding-bottom: 10px;
        }
        .opt-btn {
            background: white; border: 2px solid #e2e8f0; border-radius: 15px;
            padding: 12px 15px; font-weight: 600; text-align: left; 
            cursor: pointer; font-size: 14px; transition: 0.2s;
        }

        /* ÇARKIFELEK MODAL */
        #wheel-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 3000; display: flex; flex-direction: column; align-items: center;
            justify-content: center; backdrop-filter: blur(8px);
        }
        .wheel-container { position: relative; width: 280px; height: 280px; }
        #wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid white;
            position: relative; overflow: hidden; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            background: conic-gradient(
                #ef4444 0deg 90deg, #3b82f6 90deg 180deg, 
                #10b981 180deg 270deg, #f59e0b 270deg 360deg
            );
        }
        .wheel-pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent;
            border-right: 15px solid transparent; border-top: 30px solid white; z-index: 10;
        }
        .wheel-btn {
            margin-top: 25px; padding: 15px 40px; border-radius: 30px; border: none;
            background: var(--med-green); color: white; font-weight: 900; cursor: pointer;
        }

        .correct { background: #dcfce7 !important; border-color: var(--med-green) !important; }
        .wrong { background: #fee2e2 !important; border-color: var(--danger-red) !important; }
        .hidden { display: none !important; }

        /* GİRİŞ */
        #login {
            position: fixed; inset: 0; background: white; z-index: 4000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="login">
        <span style="font-size: 50px;">🩺</span>
        <h1 style="font-family:'Montserrat'; margin:10px 0;">PflegeDeutsch</h1>
        <input type="text" id="user-name" placeholder="Adınız Soyadınız" style="width:100%; max-width:300px; padding:15px; border-radius:15px; border:2px solid #ddd; margin-bottom:15px; text-align:center;">
        <button onclick="startApp()" style="background:var(--nurse-blue); color:white; border:none; padding:15px 50px; border-radius:15px; font-weight:900; cursor:pointer;">BAŞLA</button>
    </div>

    <div id="app" class="hidden">
        <div class="header">
            <div>
                <span id="rank-tag" style="font-size:9px; font-weight:900; color:var(--nurse-blue); border:1px solid; padding:1px 5px; border-radius:5px;">SCHÜLER</span>
                <div id="disp-name" style="font-weight:900; font-size:14px;">Dr. Name</div>
            </div>
            <div style="text-align:right;">
                <div style="font-weight:900; color:var(--warning-gold); font-size:18px;">💰 <span id="xp-val">0</span></div>
                <div style="font-size:11px; font-weight:700;">❤️ <span id="life-val">5</span></div>
            </div>
        </div>

        <div class="market-belt">
            <div class="item" onclick="buy('heart', 75)"><span class="item-icon">💉</span> <span class="item-price">75XP</span></div>
            <div class="item" onclick="buy('skip', 40)"><span class="item-icon">🚑</span> <span class="item-price">40XP</span></div>
            <div class="item" onclick="buy('hint', 25)"><span class="item-icon">💡</span> <span class="item-price">25XP</span></div>
        </div>

        <div class="game-main">
            <div class="card">
                <div class="report-text" id="vaka-text">Befund: Patient stabil.</div>
                <div id="art-badge" style="background:var(--nurse-blue); color:white; display:inline-block; padding:1px 8px; border-radius:5px; font-size:10px; font-weight:900; align-self:center;">DIE</div>
                <h2 id="q-word" style="margin:5px 0; font-size:22px;">Wort</h2>
                <button onclick="speak()" style="background:#f0f9ff; border:none; padding:8px; border-radius:10px; color:var(--nurse-blue); font-weight:700; cursor:pointer; font-size:12px;">🔊 Hören</button>
            </div>
            <div class="options-container" id="opt-grid"></div>
        </div>
    </div>

    <div id="wheel-modal" class="hidden">
        <h2 style="color:white; margin-bottom:20px; font-family:'Montserrat';">GLÜCKSRAD! 🎁</h2>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <div id="wheel">
                <div style="position:absolute; top:20%; left:50%; transform:translateX(-50%); color:white; font-weight:900;">+1 ❤️</div>
                <div style="position:absolute; top:50%; left:75%; transform:translateY(-50%); color:white; font-weight:900;">100 XP</div>
                <div style="position:absolute; bottom:20%; left:50%; transform:translateX(-50%); color:white; font-weight:900;">İPUCU</div>
                <div style="position:absolute; top:50%; left:10%; transform:translateY(-50%); color:white; font-weight:900;">50 XP</div>
            </div>
        </div>
        <button class="wheel-btn" id="spin-btn" onclick="spinWheel()">DREHEN (ÇEVİR)</button>
    </div>

<script>
    const DATA = [
        { de: "Blutdruckmessung", art: "die", tr: "Tansiyon ölçümü", vaka: "Der Patient hat einen Wert von 160/100 mmHg." },
        { de: "Verbandwechsel", art: "der", tr: "Pansuman değişimi", vaka: "Die Wunde muss gereinigt werden." },
        { de: "Sauerstoffsättigung", art: "die", tr: "Oksijen satürasyonu", vaka: "Der SpO2-Wert liegt bei 88%." },
        { de: "Lungenentzündung", art: "die", tr: "Zatürre", vaka: "Der Patient hat Husten und Fieber." },
        { de: "Oberschenkelhalsbruch", art: "der", tr: "Kalça kırığı", vaka: "Nach dem Sturz kann der Patient nicht laufen." },
        { de: "Magenspiegelung", art: "die", tr: "Gastroskopi", vaka: "Der Patient muss nüchtern bleiben." }
    ];

    let state = { xp: 0, lives: 5, current: null, wheelBusy: false };

    function startApp() {
        const name = document.getElementById('user-name').value || "Hemşire";
        document.getElementById('disp-name').innerText = name;
        document.getElementById('login').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        next();
    }

    function next() {
        // Çark ihtimali %10
        if(Math.random() < 0.1 && state.xp > 50) {
            document.getElementById('wheel-modal').classList.remove('hidden');
            return;
        }

        state.current = DATA[Math.floor(Math.random() * DATA.length)];
        document.getElementById('vaka-text').innerText = state.current.vaka;
        document.getElementById('q-word').innerText = state.current.de;
        document.getElementById('art-badge').innerText = state.current.art.toUpperCase();
        
        let opts = [state.current.tr];
        while(opts.length < 4) {
            let r = DATA[Math.floor(Math.random() * DATA.length)].tr;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('opt-grid');
        grid.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = "opt-btn";
            b.innerText = "• " + o;
            b.onclick = () => check(o === state.current.tr, b);
            grid.appendChild(b);
        });
    }

    function check(isOk, btn) {
        if(isOk) {
            state.xp += 20;
            btn.classList.add('correct');
            confetti({ particleCount: 30, origin: { y: 0.8 } });
            setTimeout(next, 600);
        } else {
            state.lives--;
            btn.classList.add('wrong');
            if(state.lives <= 0) alert("Nöbet bitti! XP: " + state.xp);
            setTimeout(next, 800);
        }
        updateUI();
    }

    function buy(type, cost) {
        if(state.xp >= cost) {
            state.xp -= cost;
            if(type === 'heart') state.lives++;
            if(type === 'skip') next();
            if(type === 'hint') {
                const b = Array.from(document.querySelectorAll('.opt-btn'));
                b.filter(x => x.innerText.slice(2) !== state.current.tr).slice(0,2).forEach(x => x.style.opacity = '0.3');
            }
            updateUI();
        }
    }

    function spinWheel() {
        if(state.wheelBusy) return;
        state.wheelBusy = true;
        const wheel = document.getElementById('wheel');
        const randDeg = Math.floor(Math.random() * 360) + 3600; // 10 tur + rastgele
        wheel.style.transform = `rotate(${randDeg}deg)`;

        setTimeout(() => {
            const actualDeg = randDeg % 360;
            let win = "";
            if(actualDeg >= 0 && actualDeg < 90) { state.lives++; win = "1 CAN!"; }
            else if(actualDeg >= 90 && actualDeg < 180) { state.xp += 50; win = "50 XP!"; }
            else if(actualDeg >= 180 && actualDeg < 270) { win = "İPUCU HEDİYE!"; }
            else { state.xp += 100; win = "100 XP!"; }
            
            alert("TEBRİKLER: " + win);
            document.getElementById('wheel-modal').classList.add('hidden');
            wheel.style.transform = "rotate(0deg)";
            state.wheelBusy = false;
            updateUI();
            next();
        }, 4500);
    }

    function updateUI() {
        document.getElementById('xp-val').innerText = state.xp;
        document.getElementById('life-val').innerText = state.lives;
        document.getElementById('rank-tag').innerText = state.xp > 500 ? "FACHKRAFT" : "SCHÜLER";
    }

    function speak() {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(state.current.de);
        u.lang = 'de-DE'; window.speechSynthesis.speak(u);
    }
</script>
</body>
</html>
