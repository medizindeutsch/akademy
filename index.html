<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PflegeDeutsch Ultra - ASIL Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nurse-blue: #0ea5e9; --med-green: #10b981; --warning-gold: #f59e0b;
            --danger-red: #ef4444; --bg: #f8fafc; --card: #ffffff;
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        #app { width: 100%; max-width: 480px; padding: 15px; position: relative; }

        /* GİRİŞ EKRANI */
        #login-screen {
            position: fixed; inset: 0; background: white; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px;
        }

        /* ÜST PANEL */
        .status-header {
            background: white; padding: 15px 20px; border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border: 2px solid var(--nurse-blue);
        }

        /* KRİTİK MÜDAHALE (LUCKY DROP) */
        #lucky-drop {
            position: absolute; right: 20px; top: 120px; cursor: pointer;
            animation: bounce 1s infinite; z-index: 100;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.1); } }

        /* MARKET (BEL ÇANTASI TASARIMI) */
        .market-bag {
            display: flex; justify-content: space-around; background: #1e293b;
            padding: 15px; border-radius: 25px; margin-bottom: 20px; color: white;
        }
        .item { text-align: center; cursor: pointer; transition: 0.3s; width: 30%; }
        .item:hover { transform: scale(1.05); }
        .item-icon { font-size: 24px; display: block; }
        .item-price { font-size: 11px; background: var(--warning-gold); color: black; border-radius: 10px; padding: 2px 5px; font-weight: 800; }

        /* SORU KARTI */
        .card {
            background: var(--card); border-radius: 35px; padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08); text-align: center;
            border-bottom: 8px solid var(--nurse-blue); margin-bottom: 20px;
        }

        .report-box {
            background: #f0f9ff; border-radius: 20px; padding: 15px;
            font-size: 13px; color: #1e40af; margin-bottom: 15px; text-align: left;
            border-left: 5px solid var(--nurse-blue); line-height: 1.5;
        }

        .opt-btn {
            background: white; border: 2px solid #e2e8f0; border-radius: 20px;
            padding: 18px; width: 100%; margin-bottom: 12px; font-weight: 600;
            text-align: left; cursor: pointer; transition: 0.2s; font-size: 15px;
        }
        .opt-btn:hover { border-color: var(--nurse-blue); background: #f0f9ff; }

        .correct { background: #dcfce7 !important; border-color: var(--med-green) !important; animation: pop 0.4s; }
        .wrong { background: #fee2e2 !important; border-color: var(--danger-red) !important; animation: shake 0.4s; }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .hidden { display: none !important; }
        .xp-pop { position: absolute; font-weight: 900; color: var(--med-green); pointer-events: none; animation: floatUp 1s forwards; }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-50px); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="text-align: center;">
            <span style="font-size: 60px;">💉</span>
            <h1 style="font-family:'Montserrat'; color:var(--nurse-blue); font-size:32px; margin:10px 0;">PflegeDeutsch Pro</h1>
            <p style="color: #64748b; margin-bottom:20px;">Hemşirelik Terminolojisi Simülasyonu</p>
            <input type="text" id="user-name" placeholder="Doktor/Hemşire Adı" style="width:100%; padding:18px; border-radius:20px; border:2px solid #ddd; margin-bottom:20px; text-align:center; font-size:16px;">
            <button onclick="startApp()" style="background:var(--nurse-blue); color:white; border:none; padding:18px; border-radius:20px; width:100%; font-weight:900; cursor:pointer;">SİSTEME GİRİŞ ➔</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <div class="status-header">
            <div>
                <span style="font-size:10px; font-weight:900; color:var(--nurse-blue);" id="rank-text">SCHÜLER</span>
                <div id="name-display" style="font-weight:900;">Hemşire</div>
            </div>
            <div style="text-align:right;">
                <div style="font-weight:900; color:var(--warning-gold); font-size:20px;">💰 <span id="xp-val">0</span></div>
                <div style="font-size:12px;">❤️ <span id="life-val">5</span></div>
            </div>
        </div>

        <div id="lucky-drop" class="hidden" onclick="claimLuckyDrop()">
            <div style="background:var(--warning-gold); padding:10px; border-radius:50%; box-shadow:0 5px 15px rgba(0,0,0,0.2); font-size:30px;">🎁</div>
            <span style="background:white; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:900; border:1px solid gold;">TIKLA!</span>
        </div>

        <div class="market-bag">
            <div class="item" onclick="shop('heart', 75)">
                <span class="item-icon">💉</span>
                <span style="font-size:10px; font-weight:700;">Can Al</span> <br>
                <span class="item-price">75 XP</span>
            </div>
            <div class="item" onclick="shop('skip', 40)">
                <span class="item-icon">🚑</span>
                <span style="font-size:10px; font-weight:700;">Pas Geç</span> <br>
                <span class="item-price">40 XP</span>
            </div>
            <div class="item" onclick="shop('hint', 25)">
                <span class="item-icon">💡</span>
                <span style="font-size:10px; font-weight:700;">İpucu</span> <br>
                <span class="item-price">25 XP</span>
            </div>
        </div>

        <div id="game-zone">
            <div class="card">
                <div class="report-box">
                    <b>PFLEGEBERICHT:</b><br><span id="vaka-text">...</span>
                </div>
                <span id="q-icon" style="font-size:50px; display:block; margin-bottom:10px;">🩺</span>
                <div id="art-tag" style="background:var(--nurse-blue); color:white; display:inline-block; padding:2px 12px; border-radius:10px; font-size:11px; font-weight:900;">DER</div>
                <h2 id="q-word" style="margin:10px 0; font-size:26px;">...</h2>
                <button onclick="speak()" style="background:#f0f9ff; border:none; padding:10px 20px; border-radius:15px; color:var(--nurse-blue); cursor:pointer; font-weight:700;">🔊 Telaffuz</button>
            </div>
            <div id="options-grid"></div>
        </div>

        <div id="over-screen" class="hidden">
            <div class="card" style="border-color:var(--danger-red);">
                <h1 style="font-size:50px;">🩺</h1>
                <h2>Nöbet Bitti!</h2>
                <div id="error-list" style="text-align:left; background:#fff1f2; padding:15px; border-radius:20px; font-size:13px; color:#b91c1c;"></div>
                <button onclick="location.reload()" style="background:var(--nurse-blue); color:white; border:none; padding:18px; border-radius:20px; width:100%; font-weight:900; margin-top:15px; cursor:pointer;">YENİ NÖBET</button>
            </div>
        </div>
    </div>

<script>
    const VOCAB = [
        { de: "Blutdruckmessung", art: "die", tr: "Tansiyon ölçümü", icon: "🩺", vaka: "Der Patient hat Kopfschmerzen. Der Wert ist 170/95 mmHg." },
        { de: "Verbandwechsel", art: "der", tr: "Pansuman değişimi", icon: "🩹", vaka: "Die Wunde am Fuß muss gereinigt und neu verbunden werden." },
        { de: "Körperpflege", art: "die", tr: "Vücut bakımı", icon: "🧼", vaka: "Ein Patient auf der Intensivstation braucht Hilfe bei der Hygiene." },
        { de: "Medikamentengabe", art: "die", tr: "İlaç verme", icon: "💊", vaka: "Der Arzt hat Schmerzmittel für 14:00 Uhr verordnet." },
        { de: "Dekubitusprophylaxe", art: "die", tr: "Yatak yarası önleme", icon: "🛏️", vaka: "Um Hautschäden zu vermeiden, lagern wir den Patienten um." },
        { de: "Absaugen", art: "das", tr: "Aspire etme", icon: "🧪", vaka: "Der Patient hat viel Sekret in den Atemwegen." },
        { de: "Infusion", art: "die", tr: "İnfüzyon (Serum)", icon: "💉", vaka: "Flüssigkeit wird über einen intravenösen Zugang verabreicht." },
        { de: "Mobilisation", art: "die", tr: "Hareketlendirme", icon: "🚶", vaka: "Wir helfen dem Patienten, das erste Mal nach der OP aufzustehen." }
    ];

    let state = { name: "", xp: 0, lives: 5, current: null, mistakes: [], nextLucky: 3 };

    function startApp() {
        state.name = document.getElementById('user-name').value || "Hemşire";
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('name-display').innerText = state.name;
        nextTask();
    }

    function nextTask() {
        state.current = VOCAB[Math.floor(Math.random() * VOCAB.length)];
        document.getElementById('vaka-text').innerText = state.current.vaka;
        document.getElementById('q-icon').innerText = state.current.icon;
        document.getElementById('q-word').innerText = state.current.de;
        document.getElementById('art-tag').innerText = state.current.art.toUpperCase();
        
        let opts = [state.current.tr];
        while(opts.length < 4) {
            let r = VOCAB[Math.floor(Math.random() * VOCAB.length)].tr;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('options-grid');
        grid.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = "opt-btn";
            b.innerText = o;
            b.onclick = (e) => check(o === state.current.tr, b, e);
            grid.appendChild(b);
        });
    }

    function check(isCorrect, btn, e) {
        if(isCorrect) {
            state.xp += 20;
            btn.classList.add('correct');
            spawnXP(e.clientX, e.clientY);
            confetti({ particleCount: 30, spread: 60, origin: { y: 0.8 } });
            
            // LUCKY DROP KONTROL
            state.nextLucky--;
            if(state.nextLucky <= 0) {
                document.getElementById('lucky-drop').classList.remove('hidden');
                state.nextLucky = Math.floor(Math.random() * 5) + 4; // Rastgele 4-8 soru sonra tekrar
            }

            setTimeout(nextTask, 600);
        } else {
            state.lives--;
            btn.classList.add('wrong');
            if(!state.mistakes.find(m => m.de === state.current.de)) state.mistakes.push(state.current);
            if(state.lives <= 0) return endGame();
            setTimeout(nextTask, 800);
        }
        updateUI();
    }

    function spawnXP(x, y) {
        const span = document.createElement('span');
        span.className = 'xp-pop';
        span.innerText = '+20 XP';
        span.style.left = x + 'px';
        span.style.top = y + 'px';
        document.body.appendChild(span);
        setTimeout(() => span.remove(), 1000);
    }

    function claimLuckyDrop() {
        document.getElementById('lucky-drop').classList.add('hidden');
        const prizes = ['heart', 'hint', 'bonus'];
        const win = prizes[Math.floor(Math.random() * prizes.length)];
        
        if(win === 'heart') {
            state.lives++;
            alert("🎁 SERUM TAKVİYESİ! +1 Can kazandın.");
        } else if(win === 'hint') {
            alert("🎁 UZMAN GÖRÜŞÜ! Bir sonraki soruda ipucu bedava.");
            state.xp += 25; // İpucu parasını iade et gibi düşün
        } else {
            state.xp += 50;
            alert("🎁 MESAİ BONUSU! +50 XP kazandın.");
        }
        updateUI();
        confetti({ particleCount: 100, colors: ['#f59e0b'] });
    }

    function shop(type, cost) {
        if(state.xp >= cost) {
            state.xp -= cost;
            if(type === 'heart') state.lives++;
            if(type === 'skip') nextTask();
            if(type === 'hint') {
                const btns = Array.from(document.querySelectorAll('.opt-btn'));
                btns.filter(b => b.innerText !== state.current.tr).slice(0, 2).forEach(b => b.style.opacity = '0.3');
            }
            updateUI();
        } else { alert("XP Yetersiz!"); }
    }

    function updateUI() {
        document.getElementById('xp-val').innerText = state.xp;
        document.getElementById('life-val').innerText = state.lives;
        let r = "SCHÜLER";
        if(state.xp > 1000) r = "STATIONSLEITUNG";
        else if(state.xp > 400) r = "PFLEGEFACHKRAFT";
        document.getElementById('rank-text').innerText = r;
    }

    function endGame() {
        document.getElementById('game-zone').classList.add('hidden');
        document.getElementById('over-screen').classList.remove('hidden');
        document.getElementById('error-list').innerHTML = "<b>HATALARINI NOT AL:</b><br>" + 
            state.mistakes.map(m => `• ${m.art} ${m.de} (${m.tr})`).join('<br>');
    }

    function speak() {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(`${state.current.art} ${state.current.de}`);
        u.lang = 'de-DE'; window.speechSynthesis.speak(u);
    }
</script>
</body>
</html>
